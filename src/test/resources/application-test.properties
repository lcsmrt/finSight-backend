# Test profile — zero dependence on .env/tunnel state.
# Datasource is provided by Testcontainers' @ServiceConnection (TestContainersConfig),
# which supersedes these values; they exist only so the ${SPRING_DATASOURCE_URL}
# placeholder in application.properties never fails to resolve when no .env is present.
spring.datasource.url=jdbc:postgresql://localhost:5432/unused
spring.datasource.username=test
spring.datasource.password=test

spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

jwt.secret-key=dGVzdC1vbmx5LXNlY3JldC1rZXktZm9yLWludGVncmF0aW9uLXRlc3RzLW5vdC1mb3ItcHJvZA==
jwt.expiration-ms=86400000

spring.devtools.restart.enabled=false
