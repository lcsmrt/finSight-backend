# Testcontainers 1.21.x's docker-java probes with a hardcoded old API version (1.32),
# which Docker Engine 29+ rejects outright ("client version 1.32 is too old").
# Pinning here skips negotiation and talks directly at a version both sides support.
# See https://github.com/testcontainers/testcontainers-java/issues/11210 — fixed upstream
# in testcontainers 2.x; remove this file when the project upgrades past 1.21.x.
api.version=1.44
